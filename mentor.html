<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#fef2f2">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Mentor Dashboard | Nudge Academy Mock Tests</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #dc2626;
            --primary-dark: #b91c1c;
            --primary-bg: #fef2f2;
            --dark: #0f172a;
            --gray-600: #475569;
            --gray-500: #64748b;
            --gray-400: #94a3b8;
            --gray-200: #e2e8f0;
            --gray-100: #f1f5f9;
            --gray-50: #f8fafc;
            --white: #fff;
            --font: 'Plus Jakarta Sans', sans-serif;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-red: 0 4px 14px 0 rgba(220, 38, 38, 0.39);
            --radius: 8px;
            --radius-lg: 16px;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--gray-50);
            min-height: 100vh;
        }

        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--dark);
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 52px;
            height: 52px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            padding: 5px;
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--white);
        }

        .logo-text span {
            color: var(--primary);
        }

        .sidebar-nav {
            flex: 1;
            padding: 16px 0;
        }

        .nav-section {
            padding: 8px 24px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gray-500);
            margin-top: 16px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 24px;
            color: var(--gray-400);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
            border-left: 3px solid transparent;
            cursor: pointer;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--white);
        }

        .nav-item.active {
            background: rgba(220, 38, 38, 0.1);
            color: var(--primary);
            border-left-color: var(--primary);
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
        }

        .sidebar-footer {
            padding: 16px 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-exit {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px;
            background: rgba(220, 38, 38, 0.1);
            border: none;
            border-radius: var(--radius);
            color: var(--primary);
            font-family: var(--font);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
        }

        .btn-exit:hover {
            background: var(--primary);
            color: var(--white);
        }

        /* Main */
        .main-content {
            flex: 1;
            margin-left: 260px;
        }

        .admin-header {
            background: var(--white);
            padding: 20px 32px;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--dark);
        }

        .admin-avatar {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--primary), #ef4444);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-weight: 700;
        }

        .content-area {
            padding: 32px;
        }

        .section-panel {
            display: none;
        }

        .section-panel.active {
            display: block;
        }

        /* Cards */
        .card {
            background: var(--white);
            border-radius: var(--radius-lg);
            border: 1px solid var(--gray-200);
            margin-bottom: 24px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--gray-100);
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--dark);
        }

        .card-body {
            padding: 24px;
        }

        /* Dash Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 24px;
        }

        .metric-card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg);
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .metric-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .metric-info h3 {
            font-size: 0.9rem;
            color: var(--gray-500);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .metric-info .value {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--dark);
        }

        .bg-red {
            background: var(--primary-bg);
            color: var(--primary);
        }

        .bg-blue {
            background: #dbeafe;
            color: #2563eb;
        }

        .bg-purple {
            background: #ede9fe;
            color: #7c3aed;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            font-family: var(--font);
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-primary {
            background: var(--primary);
            color: var(--white);
            box-shadow: var(--shadow-red);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 0.85rem;
        }

        .btn-outline {
            background: transparent;
            color: var(--dark);
            border: 1px solid var(--gray-200);
        }

        .btn-outline:hover {
            background: var(--gray-50);
        }

        /* Search Box */
        .search-box {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            padding: 10px 16px;
            border-radius: var(--radius);
            width: 100%;
            max-width: 400px;
        }

        .search-box input {
            border: none;
            background: transparent;
            width: 100%;
            font-family: var(--font);
            font-size: 0.95rem;
            outline: none;
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--gray-100);
        }

        th {
            font-weight: 600;
            color: var(--gray-500);
            font-size: 0.85rem;
            text-transform: uppercase;
            background: var(--gray-50);
            border-bottom: 2px solid var(--gray-100);
        }

        .table-container {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-success {
            background: var(--primary-bg);
            color: var(--primary);
        }

        .badge-info {
            background: #dbeafe;
            color: #2563eb;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .toast {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(100%);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .toast-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .toast.success .toast-icon {
            background: var(--primary-bg);
            color: var(--primary);
        }

        .toast.error .toast-icon {
            background: #fef2f2;
            color: #dc2626;
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            padding: 24px;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--white);
            border-radius: 20px;
            padding: 0;
            width: 100%;
            max-width: 650px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            transform: translateY(30px) scale(0.95);
            transition: all 0.3s ease;
            box-shadow: 0 25px 80px -20px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0) scale(1);
        }

        .modal-header {
            background: var(--white);
            padding: 24px;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--dark);
        }

        .modal-header p {
            color: var(--gray-500);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .modal-close {
            background: var(--gray-100);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--gray-600);
            transition: var(--transition);
        }

        .modal-close:hover {
            background: var(--gray-200);
            color: var(--dark);
        }

        .modal-body {
            padding: 24px;
            overflow-y: auto;
            background: var(--gray-50);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--gray-500);
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Results List inside Modal */
        .result-item {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-details {
            display: flex;
            gap: 24px;
        }

        .result-stat {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .result-stat .label {
            font-size: 0.75rem;
            color: var(--gray-500);
            text-transform: uppercase;
            font-weight: 600;
        }

        .result-stat .value {
            font-weight: 700;
            color: var(--dark);
            font-size: 1.1rem;
        }

        @media (max-width: 1024px) {
            .metrics-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                z-index: 1000;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
            }

            .admin-header {
                padding: 16px;
            }

            .mobile-menu-btn {
                display: block;
                background: none;
                border: none;
                font-size: 1.5rem;
                cursor: pointer;
                color: var(--dark);
                margin-right: 12px;
            }

            .content-area {
                padding: 16px;
            }

            .metrics-grid {
                grid-template-columns: 1fr;
            }

            .result-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }

            .result-details {
                flex-wrap: wrap;
                width: 100%;
                justify-content: space-between;
            }
        }

        .mobile-menu-btn {
            display: none;
        }
    </style>
</head>

<body>
    <div class="admin-layout">
        <!-- Mobile Sidebar Overlay (could be added like admin.html if needed) -->

        <aside class="sidebar" id="adminSidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="logo-icon"><img src="NUDGE_LOGO.png" alt="Nudge Academy Logo"
                            style="width: 100%; height: 100%; object-fit: contain;"></div>
                    <span class="logo-text">Nudge <span>Academy</span></span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">Mentor Portal</div>
                <a class="nav-item active" data-section="dashboard">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
                        </path>
                    </svg>
                    Dashboard
                </a>
                <a class="nav-item" data-section="students">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z">
                        </path>
                    </svg>
                    View Students
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="mentorLogoutBtn" class="btn-exit"
                    style="background:none; border:1px solid rgba(220, 38, 38, 0.2);">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                        </path>
                    </svg>
                    Logout
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="admin-header">
                <div style="display:flex;align-items:center;">
                    <button class="mobile-menu-btn"
                        onclick="document.getElementById('adminSidebar').classList.toggle('open')">☰</button>
                    <h1 class="page-title" id="pageTitle">Dashboard</h1>
                </div>
                <div class="admin-avatar" id="mentorAvatar">M</div>
            </header>

            <div class="content-area">
                <!-- Dashboard Section -->
                <div class="section-panel active" id="section-dashboard">
                    <div class="metrics-grid">
                        <div class="metric-card">
                            <div class="metric-icon bg-red">👥</div>
                            <div class="metric-info">
                                <h3>Total Students</h3>
                                <div class="value" id="dashTotalStudents">-</div>
                            </div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-icon bg-blue">📝</div>
                            <div class="metric-info">
                                <h3>Total Tests Present</h3>
                                <div class="value" id="dashTotalTests">-</div>
                            </div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-icon bg-purple">⏱️</div>
                            <div class="metric-info">
                                <h3>Today's Date</h3>
                                <div class="value" style="font-size:1.2rem;line-height:1.5" id="dashDate">-</div>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <h2 class="card-title">Quick Actions</h2>
                        </div>
                        <div class="card-body">
                            <button class="btn btn-primary" onclick="showSection('students')">Browse All Students
                                →</button>
                        </div>
                    </div>
                </div>

                <!-- Students Section -->
                <div class="section-panel" id="section-students">
                    <div class="card">
                        <div class="card-header">
                            <h2 class="card-title">Student Tracking List</h2>
                            <div class="search-box">
                                <span>🔍</span>
                                <input type="text" id="studentSearch" placeholder="Search by name or email..."
                                    onkeyup="filterStudents()">
                            </div>
                        </div>
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Student Details</th>
                                        <th>Email Address</th>
                                        <th>Phone</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="studentsTable">
                                    <tr>
                                        <td colspan="4">
                                            <div class="empty-state">Loading students...</div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Student Results Modal -->
    <div class="modal-overlay" id="resultsModal">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <h2 id="modalStudentName">Student Results</h2>
                    <p id="modalStudentEmail">student@email.com</p>
                </div>
                <button class="modal-close" onclick="closeResultsModal()">✕</button>
            </div>
            <div class="modal-body" id="modalResultsBody">
                <div class="empty-state">
                    <div class="spinner" style="margin: 0 auto; margin-bottom: 16px;"></div>
                    Loading test results...
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <!-- Centralized Firebase Config -->
    <script src="firebase-config.js"></script>

    <script>
        // Check Mentor Authentication
        const storedMentor = localStorage.getItem('nudge_mentor');
        if (!storedMentor) {
            window.location.href = 'mentor_login.html';
        }

        const MENTOR_USER = JSON.parse(storedMentor);
        document.getElementById('mentorAvatar').textContent = (MENTOR_USER.name || MENTOR_USER.email || 'M').charAt(0).toUpperCase();

        let allStudents = [];

        async function initDashboard() {
            try {
                // Set Date
                const dateOptions = { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' };
                document.getElementById('dashDate').textContent = new Date().toLocaleDateString('en-US', dateOptions);

                // Load Data concurrently
                const [users, tests] = await Promise.all([
                    NudgeDB.getAllUsers(),
                    NudgeDB.getTests(true) // Wait, NudgeDB.getTests is unrestricted right now in firestore.rules
                ]);

                allStudents = users;

                document.getElementById('dashTotalStudents').textContent = users.length;
                document.getElementById('dashTotalTests').textContent = tests.length;

                renderStudents(allStudents);
            } catch (error) {
                console.error("Dashboard Init Error:", error);
                showToast("Failed to load mentor dashboard data", "error");
            }
        }

        // Run Init
        initDashboard();

        // Logout logic
        document.getElementById('mentorLogoutBtn').addEventListener('click', () => {
            localStorage.removeItem('nudge_mentor');
            if (typeof NudgeDB !== 'undefined' && NudgeDB.logout) {
                NudgeDB.logout();
            }
            window.location.href = 'mentor_login.html';
        });

        // Navigation
        document.querySelectorAll('.nav-item[data-section]').forEach(item => {
            item.addEventListener('click', () => showSection(item.dataset.section));
        });

        function showSection(section) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.querySelector(`[data-section="${section}"]`)?.classList.add('active');
            document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(`section-${section}`)?.classList.add('active');

            let title = 'Dashboard';
            if (section === 'students') title = 'Manage Students';
            document.getElementById('pageTitle').textContent = title;

            // Close sidebar on mobile
            if (window.innerWidth <= 768) {
                document.getElementById('adminSidebar').classList.remove('open');
            }
        }

        function renderStudents(studentsList) {
            const tbody = document.getElementById('studentsTable');
            if (!studentsList.length) {
                tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state">No students found</div></td></tr>';
                return;
            }

            tbody.innerHTML = studentsList.map(s => `
                <tr>
                    <td><strong>${s.name || 'Unknown User'}</strong></td>
                    <td>${s.email || '-'}</td>
                    <td>${s.phone || '-'}</td>
                    <td>
                        <button class="btn btn-primary btn-sm" onclick="openStudentResults('${s.uid}', '${s.name || 'Unknown User'}', '${s.email}')">
                            View Results
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function filterStudents() {
            const q = document.getElementById('studentSearch').value.toLowerCase();
            const filtered = allStudents.filter(s =>
                (s.name && s.name.toLowerCase().includes(q)) ||
                (s.email && s.email.toLowerCase().includes(q))
            );
            renderStudents(filtered);
        }

        // Results View Logic
        async function openStudentResults(uid, name, email) {
            document.getElementById('modalStudentName').textContent = name;
            document.getElementById('modalStudentEmail').textContent = email;

            const modalBody = document.getElementById('modalResultsBody');
            modalBody.innerHTML = `
                <div class="empty-state">
                    <div class="spinner" style="margin: 0 auto; margin-bottom: 16px;"></div>
                    Fetching tests...
                </div>`;

            document.getElementById('resultsModal').classList.add('active');

            try {
                // Fetch attempts limits 5 natively in NudgeDB
                const results = await NudgeDB.getUserResults(uid);

                if (!results || results.length === 0) {
                    modalBody.innerHTML = `
                        <div class="empty-state" style="padding: 32px; background: white; border-radius: 12px; margin-top:20px;">
                            <div style="font-size: 3rem; margin-bottom: 16px;">📭</div>
                            <h3 style="color: var(--dark); margin-bottom: 8px;">No Attempts Yet</h3>
                            <p>This student hasn't taken any mock tests yet.</p>
                        </div>`;
                    return;
                }

                modalBody.innerHTML = '<h3 style="margin-bottom:16px; color:var(--dark);">Recent Attempts (Max 5)</h3>' +
                    results.map(r => `
                    <div class="result-item">
                        <div>
                            <div style="font-weight:700; color:var(--dark); margin-bottom:8px; font-size:1.1rem;">${r.testTitle || 'Unknown Test'}</div>
                            <div style="color:var(--gray-500); font-size:0.85rem;">Date: ${new Date(r.date || r.createdAt).toLocaleString()}</div>
                        </div>
                        <div class="result-details">
                            <div class="result-stat">
                                <span class="label">Score</span>
                                <span class="value" style="color:var(--primary);">${r.score} / ${r.totalScore}</span>
                            </div>
                            <div class="result-stat">
                                <span class="label">Accuracy</span>
                                <span class="value">${r.percentage}%</span>
                            </div>
                            <div class="result-stat">
                                <span class="label">Attempted</span>
                                <span class="value">${r.attempted} / ${r.totalQuestions}</span>
                            </div>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error("Error fetching results", error);
                modalBody.innerHTML = `
                    <div style="padding: 24px; text-align:center; color: var(--primary);">
                        Error loading results: ${error.message}
                    </div>
                `;
            }
        }

        function closeResultsModal() {
            document.getElementById('resultsModal').classList.remove('active');
        }

        // Close modal on outside click
        document.getElementById('resultsModal').addEventListener('click', (e) => {
            if (e.target.id === 'resultsModal') closeResultsModal();
        });

        // Toast Helper
        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<div class="toast-icon">${type === 'success' ? '✓' : '✕'}</div><div>${msg}</div>`;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }
    </script>
</body>

</html>
